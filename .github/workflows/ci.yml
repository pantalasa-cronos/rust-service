name: GH-Actions
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: 1.85.0

jobs:
  rust_service_build:
    runs-on: cronos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true
      - name: Install dependencies
        run: apt-get update && apt-get install -y build-essential pkg-config libssl-dev
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.85.0
          . "$HOME/.cargo/env"
          rustup default 1.85.0
      - name: Build
        run: |
          . "$HOME/.cargo/env"
          cargo build
      - name: Test
        run: |
          . "$HOME/.cargo/env"
          cargo test
      - name: Build Docker image
        run: |
          docker build --pull --no-cache \
            --label git_sha=${{ github.sha }} \
            --label build_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            --label version=${{ github.ref_name }} \
            --label repository=${{ github.repository }} \
            -t rust-service:${{ github.sha }} \
            .

  ok_release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: rust_service_build
    runs-on: cronos
    env:
      COMPONENT: github.com/${{ github.repository }}
      RELEASE_SHA: ${{ github.sha }}
    steps:
      # REPRO TIMING: let CI + server-side code collection fully settle while
      # this run stays in_progress, so ok-release runs with NO further collection
      # to re-trigger a fresh eval. That is the deadlock condition (Tanner:
      # "policies finished ~25s before release"). If ok-release starts while
      # collection is still flowing, the in-flight PolicyRunIntents re-eval with
      # is_ok_waiter=true and it self-heals instead of deadlocking.
      - name: Let collection settle before the gate
        run: |
          echo "Waiting for collection to settle before the release gate..."
          sleep 210
      - name: Check release policies
        run: |
          echo "=========================================="
          echo "  Lunar Release Gate"
          echo "=========================================="
          echo ""
          echo "Component: $COMPONENT"
          echo "Commit:    $RELEASE_SHA"
          echo ""
          echo "Running release gate check..."
          if lunar policy ok-release "$COMPONENT" "$RELEASE_SHA"; then
            echo ""
            echo "✅ All release policies passed — proceeding with deploy."
          else
            echo ""
            echo "❌ Release blocked — one or more policies with enforcement"
            echo "   'block-release' or 'block-pr-and-release' are failing"
            echo "   for this commit."
            echo ""
            echo "   View details: https://cronos.demo.earthly.dev"
            exit 1
          fi

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: ok_release
    runs-on: cronos
    steps:
      - name: Release
        run: |
          echo "🚀 Deploying ${{ github.repository }} @ ${{ github.sha }}..."
          sleep 2
          echo "Deploy complete."
